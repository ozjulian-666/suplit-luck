<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Administrador | Soplit Luck</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6 text-red-600">
            Acceso Administrador
        </h1>

        <form action="dashboard_admin.html">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">Usuario</label>
                <input type="text" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>

            <button type="submit"
                class="w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 transition">
                Iniciar sesión
            </button>
        </form>

        <a href="invitado.html"
            class="block text-center mt-4 text-sm text-gray-600 hover:text-red-600">
            ← Volver al inicio
        </a>
    </div>

</body>
</html>
