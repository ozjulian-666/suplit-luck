<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soplit.Luck - Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-gradient-luck { background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 50%, #60A5FA 100%); }
        .card-shadow { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }
        .hover-scale { transition: transform 0.2s; }
        .hover-scale:hover { transform: scale(1.02); }
    </style>
</head>

<body class="bg-gradient-luck min-h-screen">

<div class="min-h-screen flex">
    <!-- Left Side - Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
        <div class="w-full max-w-lg">

            <!-- Mobile Logo -->
            <div class="lg:hidden text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl mb-4">
                    <span class="text-2xl">🍀</span>
                </div>
                <h1 class="text-2xl font-bold text-white">Soplit.Luck</h1>
            </div>

            <div class="bg-white rounded-2xl p-8 card-shadow hover-scale">
                <h2 class="text-3xl font-bold text-gray-900 mb-2 text-center">Crear Cuenta</h2>
                <p class="text-gray-600 text-center mb-6">Únete a la comunidad de ganadores</p>

                <!-- FORMULARIO -->
                <form class="space-y-4" onsubmit="handleRegister(event)">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Nombre</label>
                            <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Apellido</label>
                            <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-xl">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Correo Electrónico</label>
                        <input type="email" required class="w-full px-4 py-3 border border-gray-300 rounded-xl">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Número de Teléfono</label>
                        <input type="tel" required class="w-full px-4 py-3 border border-gray-300 rounded-xl">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Cédula de Ciudadanía</label>
                        <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-xl">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
                            <input type="password" required class="w-full px-4 py-3 border border-gray-300 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Confirmar Contraseña</label>
                            <input type="password" required class="w-full px-4 py-3 border border-gray-300 rounded-xl">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Ciudad</label>
                        <select required class="w-full px-4 py-3 border border-gray-300 rounded-xl">
                            <option value="">Selecciona tu ciudad</option>
                            <option>Bogotá</option>
                            <option>Medellín</option>
                            <option>Cali</option>
                            <option>Barranquilla</option>
                            <option>Cartagena</option>
                            <option>Otra</option>
                        </select>
                    </div>

                    <!-- CHECKBOX -->
                    <div class="space-y-3">
                        <label class="flex items-start">
                            <input type="checkbox" id="terms" class="mt-1 mr-3">
                            <span class="text-sm text-gray-600">
                                Acepto los <a href="terminos.html" class="text-blue-600 font-medium">Términos y Condiciones</a>
                            </span>
                        </label>

                        <label class="flex items-start">
                            <input type="checkbox" id="age" class="mt-1 mr-3">
                            <span class="text-sm text-gray-600">
                                Soy mayor de 18 años
                            </span>
                        </label>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-3 rounded-xl font-semibold">
                        Crear Mi Cuenta
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600">¿Ya tienes cuenta?
                        <a href="login.html" class="text-blue-600 font-semibold hover:underline">
                            Inicia sesión aquí
                        </a>
                    </p>
                </div>

            </div>
        </div>
    </div>

    <!-- Right Side -->
    <div class="hidden lg:flex lg:w-1/2 bg-white bg-opacity-10 backdrop-blur-sm items-center justify-center p-12 text-white">
        <div class="text-center max-w-md">
            <h3 class="text-4xl font-bold mb-6">¡Únete Hoy!</h3>
            <p class="text-blue-100 mb-8">Regístrate y empieza a ganar premios increíbles</p>
        </div>
    </div>
</div>

<!-- FOOTER -->
<div class="absolute bottom-0 left-0 right-0 p-6 text-center">
    <p class="text-blue-100 text-sm">© 2024 Soplit.Luck</p>
</div>

<script>
function handleRegister(event) {
    event.preventDefault();

    const terms = document.getElementById("terms").checked;
    const age = document.getElementById("age").checked;

    if (!terms || !age) {
        alert("Debes aceptar los términos y confirmar que eres mayor de edad.");
        return;
    }

    alert("Registro exitoso 🎉 Ahora inicia sesión");
    window.location.href = "login.html";
}
</script>

</body>
</html>
